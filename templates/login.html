<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MediAI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon"  href="static/images/logo.png">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            padding: 20px;
        }

        .auth-box {
            background: #1e293b;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 450px;
            padding: 40px;
            border: 1px solid #334155;
        }

        .auth-box h2 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-section h1 {
            color: #22c55e;
            margin: 0;
            font-size: 32px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #cbd5e1;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #334155;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
            box-sizing: border-box;
            background: #0f172a;
            color: white;
        }

        .form-group input:focus {
            outline: none;
            border-color: #22c55e;
            box-shadow: 0 0 5px rgba(34, 197, 94, 0.3);
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(34, 197, 94, 0.4);
        }

        .signup-link {
            text-align: center;
            margin-top: 20px;
            color: #cbd5e1;
        }

        .signup-link a {
            color: #22c55e;
            text-decoration: none;
            font-weight: 600;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }

        .alert {
            padding: 12px 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            animation: slideIn 0.3s ease-in;
        }

        .alert-success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-danger {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-info {
            background-color: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .back-home {
            text-align: center;
            margin-top: 20px;
        }

        .back-home a {
            color: #22c55e;
            text-decoration: none;
            font-size: 14px;
        }

        .back-home a:hover {
            text-decoration: underline;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .auth-box {
                padding: 30px 20px;
                max-width: 100%;
            }

            .auth-box h2 {
                font-size: 24px;
                margin-bottom: 25px;
            }

            .logo-section h1 {
                font-size: 28px;
            }

            .logo-section p {
                font-size: 13px;
            }

            .form-group label {
                font-size: 13px;
            }

            .form-group input {
                padding: 10px 12px;
                font-size: 13px;
            }

            .btn-login {
                padding: 10px;
                font-size: 14px;
            }

            .signup-link {
                margin-top: 15px;
                font-size: 13px;
            }

            .back-home a {
                font-size: 12px;
            }
        }

        @media (max-width: 480px) {
            .auth-container {
                padding: 15px;
            }

            .auth-box {
                padding: 20px 15px;
            }

            .auth-box h2 {
                font-size: 20px;
                margin-bottom: 20px;
            }

            .logo-section {
                margin-bottom: 20px;
            }

            .logo-section h1 {
                font-size: 24px;
            }

            .logo-section p {
                font-size: 12px;
            }

            .form-group {
                margin-bottom: 15px;
            }

            .form-group label {
                font-size: 12px;
                margin-bottom: 6px;
            }

            .form-group input {
                padding: 8px 10px;
                font-size: 12px;
            }

            .btn-login {
                padding: 8px;
                font-size: 13px;
            }

            .alert {
                padding: 10px 12px;
                font-size: 12px;
                margin-bottom: 15px;
            }

            .signup-link {
                margin-top: 12px;
                font-size: 12px;
            }

            .back-home {
                margin-top: 12px;
            }

            .back-home a {
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="logo-section">
                <h1>🏥 MediAI</h1>
                <p style="color: #999; margin: 5px 0 0 0;">Intelligent Health Analytics</p>
            </div>

            <h2>Login</h2>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required placeholder="Enter your username">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Enter your password">
                </div>

                <button type="submit" class="btn-login">Login</button>
            </form>

            <div class="signup-link">
                Don't have an account? <a href="{{ url_for('signup') }}">Sign up here</a>
            </div>

            <div class="back-home">
                <a href="{{ url_for('home') }}">← Back to Home</a>
            </div>
        </div>
    </div>
</body>
</html>
